name: Auto Fix Reusable

on:
  workflow_call:
    inputs:
      app_id:
        required: true
        type: string
        description: "GitHub App ID for cross-org token generation"
      failed_run_id:
        required: true
        type: string
        description: "ID of the failed workflow run to analyze"
      repository:
        required: true
        type: string
        description: "Full repo name (owner/repo) where CI failed"
      head_branch:
        required: true
        type: string
        description: "Branch where CI failed (from github.event.workflow_run.head_branch)"
    secrets:
      anthropic_api_key:
        required: true
      app_private_key:
        required: true

jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write
      actions: read
      issues: write

    steps:
      # 1. Generate cross-org token
      - name: Generate token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ inputs.app_id }}
          private-key: ${{ secrets.app_private_key }}

      # 2. Checkout central repo for scripts, prompts, and config
      - name: Checkout central repo
        uses: actions/checkout@v4
        with:
          repository: fbetancourtc/auto-fix-agent
          path: _auto-fix-scripts
          token: ${{ steps.app-token.outputs.token }}
          sparse-checkout: |
            scripts
            prompts
            config
            metrics

      # 3. Checkout the failing repo as main working directory
      - name: Checkout failing repo
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.repository }}
          ref: ${{ inputs.head_branch }}
          token: ${{ steps.app-token.outputs.token }}

      # 4. Circuit breaker (SECR-02)
      # Prevents infinite loops: blocks if the failing run came from an
      # auto-fix branch or a PR with the auto-fix label.
      - name: Circuit breaker
        id: circuit
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const repo = '${{ inputs.repository }}'.split('/');
            const owner = repo[0];
            const repoName = repo[1];
            const runId = parseInt('${{ inputs.failed_run_id }}');

            // Get the workflow run details
            // Fail open: if API call fails, proceed with fix (don't block on transient errors)
            let headBranch;
            try {
              const run = await github.rest.actions.getWorkflowRun({
                owner,
                repo: repoName,
                run_id: runId
              });
              headBranch = run.data.head_branch;
            } catch (e) {
              core.warning(`Circuit breaker: getWorkflowRun failed (failing open): ${e.message}`);
              core.setOutput('should_proceed', 'true');
              return;
            }

            // Check 1: Is this from an auto-fix branch?
            if (headBranch && headBranch.startsWith('auto-fix/')) {
              core.setOutput('should_proceed', 'false');
              core.info(`Circuit breaker TRIPPED: branch "${headBranch}" is an auto-fix branch`);
              return;
            }

            // Check 2: Does any open PR on this branch have the auto-fix label?
            try {
              const pulls = await github.rest.pulls.list({
                owner,
                repo: repoName,
                head: `${owner}:${headBranch}`,
                state: 'open'
              });
              for (const pr of pulls.data) {
                if (pr.labels.some(l => l.name === 'auto-fix')) {
                  core.setOutput('should_proceed', 'false');
                  core.info(`Circuit breaker TRIPPED: PR #${pr.number} has auto-fix label`);
                  return;
                }
              }
            } catch (e) {
              core.warning(`Circuit breaker: could not check PRs: ${e.message}`);
            }

            core.setOutput('should_proceed', 'true');
            core.info('Circuit breaker: CLEAR — proceeding with fix');

      # 5. Flakiness filter (CIFD-03)
      # Re-runs failed jobs once. If the re-run passes, skips the agent.
      # Polls without a hard cap -- GitHub's own job timeout-minutes is the limit.
      - name: Flakiness filter
        id: flaky
        if: steps.circuit.outputs.should_proceed == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const [owner, repoName] = '${{ inputs.repository }}'.split('/');
            const runId = parseInt('${{ inputs.failed_run_id }}');

            // Re-run only failed jobs (mutates the existing run -- same run_id)
            await github.rest.actions.reRunWorkflowFailedJobs({
              owner, repo: repoName, run_id: runId
            });
            core.info(`Re-running failed jobs for run ${runId}`);

            // Poll until completion (15s intervals)
            // No extra hard cap -- GitHub's own job timeout-minutes is the cap
            // (user decision: "Wait up to the job's own timeout-minutes setting -- no extra hard cap")
            let conclusion = null;
            while (!conclusion) {
              await new Promise(r => setTimeout(r, 15000));
              const { data: run } = await github.rest.actions.getWorkflowRun({
                owner, repo: repoName, run_id: runId
              });
              if (run.status === 'completed') {
                conclusion = run.conclusion;
              }
            }

            if (conclusion === 'success') {
              core.notice('Flaky failure detected -- passed on re-run, agent skipped');
              core.setOutput('is_flaky', 'true');
            } else {
              core.info(`Re-run concluded: ${conclusion}`);
              core.setOutput('is_flaky', 'false');
            }

      # 6. Retrieve and sanitize failed CI logs (SECR-01)
      # Uses env indirection (NOT inline ${{ }}) for untrusted content safety.
      - name: Get and sanitize failed logs
        if: steps.circuit.outputs.should_proceed == 'true' && steps.flaky.outputs.is_flaky != 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          RUN_ID: ${{ inputs.failed_run_id }}
          REPO: ${{ inputs.repository }}
        run: |
          gh run view "$RUN_ID" --repo "$REPO" --log-failed 2>/dev/null \
            > /tmp/raw-ci-logs.txt \
            || echo "No logs available" > /tmp/raw-ci-logs.txt
          bash _auto-fix-scripts/scripts/sanitize-logs.sh /tmp/raw-ci-logs.txt /tmp/ci-logs.txt

      # 7. Load stack-specific prompt
      - name: Load prompt
        id: prompt
        if: steps.circuit.outputs.should_proceed == 'true' && steps.flaky.outputs.is_flaky != 'true'
        env:
          TARGET_REPO: ${{ inputs.repository }}
        run: |
          STACK=$(jq -r --arg repo "$TARGET_REPO" '.repos[$repo].stack // "typescript"' _auto-fix-scripts/config/repo-stack-map.json)
          echo "Detected stack: $STACK for repo: $TARGET_REPO"

          PROMPT_FILE="_auto-fix-scripts/prompts/${STACK}.md"
          if [ ! -f "$PROMPT_FILE" ]; then
            echo "Warning: ${PROMPT_FILE} not found, falling back to typescript"
            PROMPT_FILE="_auto-fix-scripts/prompts/typescript.md"
          fi

          {
            echo "combined<<PROMPT_EOF"
            cat "$PROMPT_FILE"
            echo ""
            echo "---"
            echo ""
            echo "CI FAILURE LOGS (sanitized):"
            echo '```'
            cat /tmp/ci-logs.txt
            echo '```'
            echo "PROMPT_EOF"
          } >> "$GITHUB_OUTPUT"

          echo "stack=$STACK" >> "$GITHUB_OUTPUT"

      # 8. Run Claude Code Action (SECR-03 + SECR-04)
      # - --max-turns 10: soft cap on agent exchanges
      # - timeout-minutes 15 on job: hard cap
      # - --allowedTools: restricts to safe file/test + git/gh operations
      # - GH_TOKEN: repo-scoped app token for gh CLI (NOT production secrets -- satisfies SECR-04)
      - name: Run Claude Code Action
        id: agent
        if: steps.circuit.outputs.should_proceed == 'true' && steps.flaky.outputs.is_flaky != 'true'
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.anthropic_api_key }}
          prompt: ${{ steps.prompt.outputs.combined }}
          claude_args: |
            --max-turns 10
            --allowedTools Edit,Read,Write,Bash(npm test),Bash(npm run test),Bash(npx vitest run),Bash(npx vitest),Bash(npm install),Bash(pip install -r requirements.txt),Bash(pytest),Bash(python -m pytest),Bash(./gradlew test),Bash(./gradlew ktlintCheck),Bash(npx eslint),Bash(npx tsc --noEmit),Bash(ruff check),Bash(mypy),Bash(git checkout -b:*),Bash(git add:*),Bash(git status),Bash(git diff:*),Bash(git commit:*),Bash(git push:*),Bash(gh pr create:*),Bash(gh pr list:*),Bash(gh issue create:*)
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          RUN_ID: ${{ inputs.failed_run_id }}
          HEAD_BRANCH: ${{ inputs.head_branch }}
          TARGET_REPO: ${{ inputs.repository }}

      # 9. Post-agent diff validation (FIXG-02, FIXG-03)
      # Checks the agent's changes against allowed directories.
      # If forbidden files were committed, reverts them, amends, and force-pushes.
      # If no valid changes remain after revert, closes the PR.
      - name: Post-agent diff validation
        id: diff-check
        if: steps.circuit.outputs.should_proceed == 'true' && steps.flaky.outputs.is_flaky != 'true'
        env:
          TARGET_REPO: ${{ inputs.repository }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          # Check if agent actually pushed a branch (it may have stopped without committing)
          BRANCH_NAME=$(git branch --show-current)
          if [[ "$BRANCH_NAME" != auto-fix/* ]]; then
            echo "Agent did not create an auto-fix branch -- no changes to validate"
            exit 0
          fi

          # Run diff validation against allowed directories
          RESULT=0
          bash _auto-fix-scripts/scripts/validate-diff.sh "$TARGET_REPO" _auto-fix-scripts/config/repo-stack-map.json || RESULT=$?

          if [ "$RESULT" -eq 0 ]; then
            echo "All changes in allowed directories -- no corrections needed"
            exit 0
          fi

          # validate-diff.sh reverted forbidden files. Check if any valid changes remain.
          REMAINING=$(git diff --name-only HEAD~1 2>/dev/null || true)
          if [ -z "$REMAINING" ]; then
            echo "::warning::All agent changes were in forbidden directories -- closing PR"
            # Find and close the PR if it exists
            PR_NUM=$(gh pr list --repo "$TARGET_REPO" --head "$BRANCH_NAME" --json number --jq '.[0].number' 2>/dev/null || true)
            if [ -n "$PR_NUM" ]; then
              gh pr close "$PR_NUM" --repo "$TARGET_REPO" --comment "Closed: all changes were in forbidden directories"
            fi
            exit 0
          fi

          # Amend commit to exclude reverted files, force-push correction
          git add -A
          git commit --amend --no-edit
          git push --force-with-lease
          echo "::warning::Reverted forbidden files and force-pushed correction"

      # 10. Track no-commit attempt
      # If the agent ran but did not create an auto-fix branch (no commit/push/PR),
      # this still counts as one attempt. Create a closed "tracking" PR so the
      # retry guard's gh pr list count includes it.
      - name: Track failed attempt
        id: track-attempt
        if: steps.circuit.outputs.should_proceed == 'true' && steps.flaky.outputs.is_flaky != 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          RUN_ID: ${{ inputs.failed_run_id }}
          TARGET_REPO: ${{ inputs.repository }}
          HEAD_BRANCH: ${{ inputs.head_branch }}
        run: |
          # Check if agent created an auto-fix branch
          BRANCH_NAME="auto-fix/${RUN_ID}"

          # If a PR already exists for this branch, the agent succeeded -- nothing to track
          EXISTING_PR=$(gh pr list --repo "$TARGET_REPO" --head "$BRANCH_NAME" --state all --json number --jq '.[0].number' 2>/dev/null || true)
          if [ -n "$EXISTING_PR" ]; then
            echo "Agent created PR #${EXISTING_PR} -- no tracking needed"
            exit 0
          fi

          # Check if the branch exists on the remote (agent pushed but maybe didn't create PR)
          git ls-remote --exit-code origin "$BRANCH_NAME" 2>/dev/null && {
            echo "Branch exists on remote but no PR -- agent may have been interrupted"
            exit 0
          }

          # Agent did not push anything -- create a tracking branch with an empty commit
          # This creates a closed PR that the retry guard will count
          git checkout -b "$BRANCH_NAME"
          git commit --allow-empty -m "fix: auto-fix attempt failed (no viable fix found)

          Run: ${RUN_ID}
          Branch: ${HEAD_BRANCH}
          Status: Agent could not produce a working fix"
          git push origin "$BRANCH_NAME"

          # Create and immediately close a PR so retry guard counts this attempt
          PR_URL=$(gh pr create --repo "$TARGET_REPO" \
            --base develop \
            --head "$BRANCH_NAME" \
            --label "auto-fix" \
            --title "fix: auto-fix attempt failed (run #${RUN_ID})" \
            --body "## Failed Auto-Fix Attempt

          The agent analyzed the CI failure but could not produce a working fix.
          This PR is created for tracking purposes and is immediately closed.

          **CI Run:** [#${RUN_ID}](https://github.com/${TARGET_REPO}/actions/runs/${RUN_ID})
          **Branch:** \`${HEAD_BRANCH}\`

          ---
          *Generated by [auto-fix-agent](https://github.com/fbetancourtc/auto-fix-agent)*")

          gh pr close "$PR_URL" --repo "$TARGET_REPO" --comment "Auto-closed: tracking a failed fix attempt (agent could not produce a working fix)"
          echo "Tracked failed attempt via closed PR: $PR_URL"

      # 11. Determine if agent created a fix PR (for metrics)
      - name: Determine fix outcome
        id: fix-outcome
        if: always() && steps.circuit.outputs.should_proceed == 'true' && steps.flaky.outputs.is_flaky != 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          RUN_ID: ${{ inputs.failed_run_id }}
          TARGET_REPO: ${{ inputs.repository }}
        run: |
          BRANCH_NAME="auto-fix/${RUN_ID}"
          FIX_PR=$(gh pr list --repo "$TARGET_REPO" --head "$BRANCH_NAME" --state open --json number --jq '.[0].number' 2>/dev/null || true)
          if [ -n "$FIX_PR" ] && [ "$FIX_PR" != "null" ]; then
            echo "fix_pr_created=true" >> "$GITHUB_OUTPUT"
          else
            echo "fix_pr_created=false" >> "$GITHUB_OUTPUT"
          fi

      # 12. Record run metrics and check budget thresholds
      - name: Record metrics
        if: always() && steps.circuit.outputs.should_proceed == 'true' && steps.flaky.outputs.is_flaky != 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          EXECUTION_FILE: ${{ steps.agent.outputs.execution_file }}
          TARGET_REPO: ${{ inputs.repository }}
          RUN_ID: ${{ inputs.failed_run_id }}
          FIX_PR_CREATED: ${{ steps.fix-outcome.outputs.fix_pr_created }}
          CENTRAL_REPO: "fbetancourtc/auto-fix-agent"
        run: |
          bash _auto-fix-scripts/scripts/record-metrics.sh
          bash _auto-fix-scripts/scripts/check-budget.sh
