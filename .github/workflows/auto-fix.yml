name: Auto Fix Reusable

on:
  workflow_call:
    inputs:
      app_id:
        required: true
        type: string
        description: "GitHub App ID for cross-org token generation"
      failed_run_id:
        required: true
        type: string
        description: "ID of the failed workflow run to analyze"
      repository:
        required: true
        type: string
        description: "Full repo name (owner/repo) where CI failed"
      head_branch:
        required: true
        type: string
        description: "Branch where CI failed (from github.event.workflow_run.head_branch)"
    secrets:
      anthropic_api_key:
        required: true
      app_private_key:
        required: true

jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write
      actions: read

    steps:
      # 1. Generate cross-org token
      - name: Generate token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ inputs.app_id }}
          private-key: ${{ secrets.app_private_key }}

      # 2. Checkout central repo for scripts, prompts, and config
      - name: Checkout central repo
        uses: actions/checkout@v4
        with:
          repository: fbetancourtc/auto-fix-agent
          path: _auto-fix-scripts
          sparse-checkout: |
            scripts
            prompts
            config

      # 3. Checkout the failing repo as main working directory
      - name: Checkout failing repo
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.repository }}
          ref: ${{ inputs.head_branch }}
          token: ${{ steps.app-token.outputs.token }}

      # 4. Circuit breaker (SECR-02)
      # Prevents infinite loops: blocks if the failing run came from an
      # auto-fix branch or a PR with the auto-fix label.
      - name: Circuit breaker
        id: circuit
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const repo = '${{ inputs.repository }}'.split('/');
            const owner = repo[0];
            const repoName = repo[1];
            const runId = parseInt('${{ inputs.failed_run_id }}');

            // Get the workflow run details
            const run = await github.rest.actions.getWorkflowRun({
              owner,
              repo: repoName,
              run_id: runId
            });

            const headBranch = run.data.head_branch;

            // Check 1: Is this from an auto-fix branch?
            if (headBranch && headBranch.startsWith('auto-fix/')) {
              core.setOutput('should_proceed', 'false');
              core.info(`Circuit breaker TRIPPED: branch "${headBranch}" is an auto-fix branch`);
              return;
            }

            // Check 2: Does any open PR on this branch have the auto-fix label?
            try {
              const pulls = await github.rest.pulls.list({
                owner,
                repo: repoName,
                head: `${owner}:${headBranch}`,
                state: 'open'
              });
              for (const pr of pulls.data) {
                if (pr.labels.some(l => l.name === 'auto-fix')) {
                  core.setOutput('should_proceed', 'false');
                  core.info(`Circuit breaker TRIPPED: PR #${pr.number} has auto-fix label`);
                  return;
                }
              }
            } catch (e) {
              core.warning(`Circuit breaker: could not check PRs: ${e.message}`);
            }

            core.setOutput('should_proceed', 'true');
            core.info('Circuit breaker: CLEAR — proceeding with fix');

      # 5. Flakiness filter (CIFD-03)
      # Re-runs failed jobs once. If the re-run passes, skips the agent.
      # Polls without a hard cap -- GitHub's own job timeout-minutes is the limit.
      - name: Flakiness filter
        id: flaky
        if: steps.circuit.outputs.should_proceed == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const [owner, repoName] = '${{ inputs.repository }}'.split('/');
            const runId = parseInt('${{ inputs.failed_run_id }}');

            // Re-run only failed jobs (mutates the existing run -- same run_id)
            await github.rest.actions.reRunWorkflowFailedJobs({
              owner, repo: repoName, run_id: runId
            });
            core.info(`Re-running failed jobs for run ${runId}`);

            // Poll until completion (15s intervals)
            // No extra hard cap -- GitHub's own job timeout-minutes is the cap
            // (user decision: "Wait up to the job's own timeout-minutes setting -- no extra hard cap")
            let conclusion = null;
            while (!conclusion) {
              await new Promise(r => setTimeout(r, 15000));
              const { data: run } = await github.rest.actions.getWorkflowRun({
                owner, repo: repoName, run_id: runId
              });
              if (run.status === 'completed') {
                conclusion = run.conclusion;
              }
            }

            if (conclusion === 'success') {
              core.notice('Flaky failure detected -- passed on re-run, agent skipped');
              core.setOutput('is_flaky', 'true');
            } else {
              core.info(`Re-run concluded: ${conclusion}`);
              core.setOutput('is_flaky', 'false');
            }

      # 6. Retrieve and sanitize failed CI logs (SECR-01)
      # Uses env indirection (NOT inline ${{ }}) for untrusted content safety.
      - name: Get and sanitize failed logs
        if: steps.circuit.outputs.should_proceed == 'true' && steps.flaky.outputs.is_flaky != 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          RUN_ID: ${{ inputs.failed_run_id }}
          REPO: ${{ inputs.repository }}
        run: |
          gh run view "$RUN_ID" --repo "$REPO" --log-failed 2>/dev/null \
            > /tmp/raw-ci-logs.txt \
            || echo "No logs available" > /tmp/raw-ci-logs.txt
          bash _auto-fix-scripts/scripts/sanitize-logs.sh /tmp/raw-ci-logs.txt /tmp/ci-logs.txt

      # 7. Load stack-specific prompt
      - name: Load prompt
        id: prompt
        if: steps.circuit.outputs.should_proceed == 'true' && steps.flaky.outputs.is_flaky != 'true'
        env:
          TARGET_REPO: ${{ inputs.repository }}
        run: |
          STACK=$(jq -r --arg repo "$TARGET_REPO" '.[$repo] // "typescript"' _auto-fix-scripts/config/repo-stack-map.json)
          echo "Detected stack: $STACK for repo: $TARGET_REPO"

          PROMPT_FILE="_auto-fix-scripts/prompts/${STACK}.md"
          if [ ! -f "$PROMPT_FILE" ]; then
            echo "Warning: ${PROMPT_FILE} not found, falling back to typescript"
            PROMPT_FILE="_auto-fix-scripts/prompts/typescript.md"
          fi

          {
            echo "combined<<PROMPT_EOF"
            cat "$PROMPT_FILE"
            echo ""
            echo "---"
            echo ""
            echo "CI FAILURE LOGS (sanitized):"
            echo '```'
            cat /tmp/ci-logs.txt
            echo '```'
            echo "PROMPT_EOF"
          } >> "$GITHUB_OUTPUT"

          echo "stack=$STACK" >> "$GITHUB_OUTPUT"

      # 8. Run Claude Code Action (SECR-03 + SECR-04)
      # - --max-turns 10: soft cap on agent exchanges
      # - timeout-minutes 15 on job: hard cap
      # - --allowedTools: restricts to safe file and test operations
      # - No env block: agent has NO access to tokens or secrets
      - name: Run Claude Code Action
        if: steps.circuit.outputs.should_proceed == 'true' && steps.flaky.outputs.is_flaky != 'true'
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.anthropic_api_key }}
          prompt: ${{ steps.prompt.outputs.combined }}
          claude_args: |
            --max-turns 10
            --allowedTools Edit,Read,Write,Bash(npm test),Bash(npm run test),Bash(npx vitest run),Bash(npx vitest),Bash(npm install),Bash(pip install -r requirements.txt),Bash(pytest),Bash(python -m pytest),Bash(./gradlew test),Bash(./gradlew ktlintCheck),Bash(npx eslint),Bash(npx tsc --noEmit),Bash(ruff check),Bash(mypy)
