# Promote Caller -- copy to your repo's .github/workflows/promote-caller.yml
# Triggers when an auto-fix PR is merged into develop.
# This file must exist on the repo's default branch for pull_request events to trigger.
name: Promote Fix
on:
  pull_request:
    types: [closed]
  pull_request_review:
    types: [submitted]
jobs:
  promote:
    if: >-
      github.event.pull_request.merged == true &&
      contains(github.event.pull_request.labels.*.name, 'auto-fix')
    uses: fbetancourtc/auto-fix-agent/.github/workflows/promote.yml@main
    with:
      app_id: "2985828"
      repository: "${{ github.repository }}"
      merged_pr_number: "${{ github.event.pull_request.number }}"
    secrets:
      app_private_key: "${{ secrets.AUTO_FIX_APP_PRIVATE_KEY }}"

  handle-decline:
    # Close qa->main PR and add needs-human label when reviewer requests changes
    if: >-
      github.event.review.state == 'changes_requested' &&
      contains(github.event.pull_request.labels.*.name, 'auto-fix-promote') &&
      github.event.pull_request.base.ref == 'main'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions:
      pull-requests: write
      issues: write
    steps:
      - name: Close PR and add needs-human label
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          echo "Reviewer requested changes on qa->main PR #$PR_NUMBER"
          gh pr edit "$PR_NUMBER" --repo "$REPO" --add-label "needs-human"
          gh pr close "$PR_NUMBER" --repo "$REPO" --comment "Closed by auto-fix promotion system: reviewer requested changes. Label 'needs-human' added. The fix remains on develop/qa but will not be promoted to main automatically."
          echo "PR #$PR_NUMBER closed with needs-human label"
