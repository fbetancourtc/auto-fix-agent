name: CI

on:
  push:
    branches: [develop, qa, main]
  pull_request:
    branches: [develop, qa, main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Validate bash scripts
        run: |
          for script in scripts/*.sh; do
            echo "Checking $script..."
            bash -n "$script"
          done
          echo "All scripts valid"

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Run tests
        run: npm test

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Check for secrets in code
        run: |
          FAIL=false
          # Exclude files that legitimately reference secret patterns:
          #   sanitize-logs.sh — regex patterns for stripping secrets from CI logs
          #   setup-dashboard.sh / setup-alerts.sh — env var name references (not values)
          #   test-guardrails.yml — test fixtures with fake secret patterns
          EXCLUDE="--exclude=sanitize-logs.sh --exclude=setup-dashboard.sh --exclude=setup-alerts.sh --exclude=test-guardrails.yml --exclude=sentry-setup.md"

          # Check for actual hardcoded secret values in source files
          for pattern in "ghp_[a-zA-Z0-9]\{36\}" "ghs_[a-zA-Z0-9]\{36\}" "github_pat_[a-zA-Z0-9]" "sk-ant-api"; do
            if grep -rE "$pattern" api/ scripts/ docs/ --include="*.ts" --include="*.sh" --include="*.md" $EXCLUDE -l 2>/dev/null; then
              echo "FAIL: potential hardcoded secret matching '$pattern' found"
              FAIL=true
            fi
          done
          if [ "$FAIL" = true ]; then
            exit 1
          fi
          echo "PASS: no hardcoded secrets detected"
