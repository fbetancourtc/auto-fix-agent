name: Deploy Preview

# Deploys a Vercel preview on PRs to develop.
# Lets you test webhook changes before they hit production.

on:
  pull_request:
    branches: [develop]
    paths:
      - 'api/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - 'vercel.json'

concurrency:
  group: preview-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  deploy-preview:
    name: Vercel Preview
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test

      - name: Deploy to Vercel (Preview)
        id: deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          npm i -g vercel
          DEPLOY_URL=$(vercel --token="$VERCEL_TOKEN" --yes 2>&1 | grep -o 'https://[^ ]*\.vercel\.app')
          echo "url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"
          echo "Deployed to: $DEPLOY_URL"

      - name: Comment PR with preview URL
        if: steps.deploy.outputs.url
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.deploy.outputs.url }}';
            const body = `## 🔍 Vercel Preview Deployed\n\n**URL:** ${url}\n\n> ⚠️ Preview deployments return 404 on \`/api/webhook\` (env gate: non-production). Use Vercel function logs to verify deployment.\n\n---\n*Auto-generated by deploy-preview workflow*`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
