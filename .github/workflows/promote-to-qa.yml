name: Promote to QA

# Auto-creates a develop → qa PR when CI passes on develop push.
# This keeps qa tracking develop automatically.

on:
  workflow_run:
    workflows: [CI]
    branches: [develop]
    types: [completed]

jobs:
  promote:
    name: Create develop → qa PR
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if qa branch exists
        id: check
        run: |
          if git ls-remote --heads origin qa | grep -q qa; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "qa branch does not exist — skipping promotion"
          fi

      - name: Create or update develop → qa PR
        if: steps.check.outputs.exists == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Check if develop is ahead of qa
          AHEAD=$(gh api "repos/${{ github.repository }}/compare/qa...develop" --jq '.ahead_by' 2>/dev/null || echo "0")

          if [ "$AHEAD" = "0" ] || [ -z "$AHEAD" ]; then
            echo "develop is not ahead of qa — nothing to promote"
            exit 0
          fi
          echo "develop is $AHEAD commit(s) ahead of qa"

          # Check for existing open PR
          EXISTING=$(gh pr list --base qa --head develop --json number --jq '.[0].number' 2>/dev/null || true)
          if [ -n "$EXISTING" ]; then
            echo "develop→qa PR already exists (#$EXISTING) — it tracks latest develop automatically"
            exit 0
          fi

          # Get the commit message for context
          COMMIT_MSG=$(git log -1 --format='%s' origin/develop)

          gh pr create \
            --base qa \
            --head develop \
            --title "promote: develop → qa" \
            --body "## Promotion: develop → qa

          CI passed on develop. This PR promotes $AHEAD commit(s) to qa for validation.

          **Latest commit:** \`$COMMIT_MSG\`

          **Checklist:**
          - [ ] Review changes
          - [ ] Merge when ready for production path

          ---
          *Auto-generated by promote-to-qa workflow*"
