name: Promote to Main

# Auto-creates a qa → main PR when CI passes on qa push.
# Human must review and merge — this is the production gate.

on:
  push:
    branches: [qa]

jobs:
  gate:
    name: Verify CI passes on qa
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test

  promote:
    name: Create qa → main PR
    needs: gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create or update qa → main PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Check if qa is ahead of main
          AHEAD=$(gh api "repos/${{ github.repository }}/compare/main...qa" --jq '.ahead_by' 2>/dev/null || echo "0")

          if [ "$AHEAD" = "0" ] || [ -z "$AHEAD" ]; then
            echo "qa is not ahead of main — nothing to promote"
            exit 0
          fi
          echo "qa is $AHEAD commit(s) ahead of main"

          # Check for existing open PR
          EXISTING=$(gh pr list --base main --head qa --json number --jq '.[0].number' 2>/dev/null || true)
          if [ -n "$EXISTING" ]; then
            echo "qa→main PR already exists (#$EXISTING) — it tracks latest qa automatically"
            exit 0
          fi

          gh pr create \
            --base main \
            --head qa \
            --title "promote: qa → main (awaiting human approval)" \
            --body "## Promotion: qa → main

          CI passed on qa. This PR promotes $AHEAD commit(s) to production.

          **⚠️ Action required:** A human must review and merge this PR.
          This PR will NOT be auto-merged.

          **Checklist:**
          - [ ] Review all changes since last production release
          - [ ] Verify Vercel preview (if applicable)
          - [ ] Merge to trigger production deployment

          ---
          *Auto-generated by promote-to-main workflow*"
