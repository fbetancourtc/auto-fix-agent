name: Promote Fix Reusable

on:
  workflow_call:
    inputs:
      app_id:
        required: true
        type: string
        description: "GitHub App ID for cross-org token generation"
      repository:
        required: true
        type: string
        description: "Full repo name (owner/repo) where the fix PR was merged"
      merged_pr_number:
        required: true
        type: string
        description: "The auto-fix PR number that was merged"
      source_branch:
        required: false
        type: string
        default: "develop"
        description: "Branch the fix was merged into (source for promotion)"
      qa_branch:
        required: false
        type: string
        default: "qa"
        description: "QA branch name"
      main_branch:
        required: false
        type: string
        default: "main"
        description: "Main/production branch name"
    secrets:
      app_private_key:
        required: true

jobs:
  promote:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: write

    steps:
      # 1. Generate cross-org token
      - name: Generate token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ inputs.app_id }}
          private-key: ${{ secrets.app_private_key }}
          repositories: ${{ github.event.repository.name }}

      # 2. Create develop→qa PR
      # Checks for existing open PR first to prevent duplicates.
      - name: Create develop to qa PR
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO: ${{ inputs.repository }}
          SOURCE: ${{ inputs.source_branch }}
          QA: ${{ inputs.qa_branch }}
          PR_NUM: ${{ inputs.merged_pr_number }}
        run: |
          echo "Checking if $SOURCE has commits ahead of $QA..."
          AHEAD=$(gh api "repos/$REPO/compare/$QA...$SOURCE" --jq '.ahead_by' 2>/dev/null || echo "0")

          if [ "$AHEAD" = "0" ] || [ -z "$AHEAD" ]; then
            echo "$SOURCE is not ahead of $QA — nothing to promote"
            exit 0
          fi
          echo "$SOURCE is $AHEAD commit(s) ahead of $QA"

          # Check for existing open PR to prevent duplicates
          EXISTING_PR=$(gh pr list --repo "$REPO" --base "$QA" --head "$SOURCE" --json number --jq '.[0].number' 2>/dev/null || true)
          if [ -n "$EXISTING_PR" ]; then
            echo "develop→qa PR already exists (#$EXISTING_PR), skipping"
            exit 0
          fi

          # Create the develop→qa PR
          gh pr create --repo "$REPO" \
            --base "$QA" \
            --head "$SOURCE" \
            --title "promote: merge $SOURCE into $QA (fix PR #$PR_NUM)" \
            --label "auto-fix-promote" \
            --body "## Auto-Fix Promotion: $SOURCE → $QA

          Automatically created after auto-fix PR #$PR_NUM was merged into \`$SOURCE\`.

          This PR promotes the fix from \`$SOURCE\` to \`$QA\` for QA validation.

          **Source PR:** #$PR_NUM

          ---
          *Generated by [auto-fix-agent](https://github.com/fbetancourtc/auto-fix-agent)*"

          echo "Created develop→qa PR"

      # 3. Create qa→main PR (manual merge gate)
      # Creates the PR but NEVER merges it — human must click Merge.
      - name: Create qa to main PR (awaiting human approval)
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO: ${{ inputs.repository }}
          QA: ${{ inputs.qa_branch }}
          MAIN: ${{ inputs.main_branch }}
        run: |
          echo "Checking if $QA has commits ahead of $MAIN..."
          AHEAD=$(gh api "repos/$REPO/compare/$MAIN...$QA" --jq '.ahead_by' 2>/dev/null || echo "0")

          if [ "$AHEAD" = "0" ] || [ -z "$AHEAD" ]; then
            echo "$QA is not ahead of $MAIN — nothing to promote"
            exit 0
          fi
          echo "$QA is $AHEAD commit(s) ahead of $MAIN"

          # Check for existing open PR to prevent duplicates
          EXISTING_PR=$(gh pr list --repo "$REPO" --base "$MAIN" --head "$QA" --json number --jq '.[0].number' 2>/dev/null || true)
          if [ -n "$EXISTING_PR" ]; then
            echo "qa→main PR already exists (#$EXISTING_PR) — it tracks latest qa automatically"
            exit 0
          fi

          # Create the qa→main PR — NEVER auto-merge, human must approve
          gh pr create --repo "$REPO" \
            --base "$MAIN" \
            --head "$QA" \
            --title "promote: $QA to $MAIN (awaiting human approval)" \
            --label "auto-fix-promote" \
            --body "## Auto-Fix Promotion: $QA → $MAIN

          This PR promotes validated fixes from \`$QA\` to \`$MAIN\`.

          **Action required:** A human must review and merge this PR.
          This PR will NOT be auto-merged.

          ---
          *Generated by [auto-fix-agent](https://github.com/fbetancourtc/auto-fix-agent)*"

          echo "Created qa→main PR (awaiting human approval)"
